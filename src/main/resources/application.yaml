server:
  port: 8080
  # Enable HTTP response compression for all JSON responses.
  # Compresses responses larger than 1KB reducing network transfer by 60-80%.
  # This reduces time from server to client significantly on slow networks.
  compression:
    enabled: true
    min-response-size: 1024
    mime-types: application/json,application/xml,text/html

spring:
  application:
    name: jokester

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 120000
      pool-name: JokesterPool

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        # Batch inserts and updates — groups multiple operations into one DB roundtrip.
        # Reduces DB calls significantly during bulk operations.
        jdbc.batch_size: 20
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      timeout: 2000ms
      lettuce:
        # pool must be under lettuce, not directly under redis.
        # Without this the pool configuration is silently ignored
        # and Lettuce creates a new connection for every Redis operation.
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 1000ms

  cache:
    type: redis

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.application.jokester: INFO
    # Change cache logging to INFO in production — DEBUG generates too many log entries
    org.springframework.cache: INFO
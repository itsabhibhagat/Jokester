services:

  # ─── PRIMARY DB (WRITE) ───────────────────────────────
  postgres-primary:
    image: postgres:16
    container_name: jokester-postgres-primary
    restart: unless-stopped
    environment:
      POSTGRES_DB: jokester_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: FAmi12@#
    ports:
      - "5432:5432"
    volumes:
      - primary_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: >
      postgres
      -c wal_level=replica
      -c max_wal_senders=10
      -c wal_keep_size=64
    networks:
      - jokester-network

  # ─── REPLICA DB (READ) ────────────────────────────────
  postgres-replica:
    image: postgres:16
    container_name: jokester-postgres-replica
    restart: unless-stopped
    depends_on:
      - postgres-primary
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: FAmi12@#
    ports:
      - "5433:5432"
    volumes:
      - replica_data:/var/lib/postgresql/data
    command: >
      bash -c "
      sleep 5 &&
      pg_basebackup -h postgres-primary -D /var/lib/postgresql/data -U postgres -Fp -Xs -P -R &&
      postgres
      "
    networks:
      - jokester-network

  # ─── REDIS ────────────────────────────────────────────
  redis:
    image: redis:7
    container_name: jokester-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - jokester-network

  # ─── SPRING BOOT APP ──────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jokester-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:

      # 🔥 IMPORTANT: use container names, NOT localhost

      SPRING_DATASOURCE_PRIMARY_URL: jdbc:postgresql://postgres-primary:5432/jokester_db
      SPRING_DATASOURCE_PRIMARY_USERNAME: postgres
      SPRING_DATASOURCE_PRIMARY_PASSWORD: FAmi12@#

      SPRING_DATASOURCE_REPLICA_URL: jdbc:postgresql://postgres-replica:5432/jokester_db
      SPRING_DATASOURCE_REPLICA_USERNAME: postgres
      SPRING_DATASOURCE_REPLICA_PASSWORD: FAmi12@#

      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379

      JWT_SECRET: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      JWT_EXPIRATION: 86400000

    depends_on:
      - postgres-primary
      - postgres-replica
      - redis
    networks:
      - jokester-network

volumes:
  primary_data:
  replica_data:

networks:
  jokester-network:
    driver: bridge